<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #ffffff;
      color: #333;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    h2 {
      font-size: 18px;
      margin: 0;
      color: #111827;
      font-weight: 700;
    }
    p {
      font-size: 13px;
      line-height: 1.5;
      color: #6b7280;
      margin: 0;
      text-align: center;
    }
    #cleanBtn, #clearAllBtn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    #cleanBtn {
      background-color: #2563eb;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }
    #cleanBtn:hover {
      background-color: #1d4ed8;
      transform: translateY(-1px);
    }
    #clearAllBtn {
      background-color: #ef4444;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
    }
    #clearAllBtn:hover {
      background-color: #dc2626;
      transform: translateY(-1px);
    }
    #cleanBtn:active, #clearAllBtn:active {
      transform: translateY(0);
    }
    #cleanBtn:disabled, #clearAllBtn:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
      box-shadow: none;
    }
    .footer {
      font-size: 11px;
      color: #9ca3af;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Smart Cache Cleaner</h2>
      <p>Clean domain-specific or entire browser cache.</p>
    </div>
    <button id="cleanBtn">Fix Current Site (Login)</button>
    <button id="clearAllBtn">Clear Entire Browser Cache</button>
    <div class="footer">Selected action will apply immediately.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
