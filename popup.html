<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #f9fafb;
      color: #1f2937;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .header {
      text-align: center;
    }
    h2 {
      font-size: 20px;
      margin: 0 0 8px 0;
      color: #111827;
      font-weight: 700;
    }
    p {
      font-size: 14px;
      line-height: 1.5;
      color: #6b7280;
      margin: 0;
    }
    #clearAllBtn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background-color: #ef4444;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
      transition: all 0.2s ease;
    }
    #clearAllBtn:hover {
      background-color: #dc2626;
      transform: translateY(-1px);
      box-shadow: 0 6px 8px -1px rgba(239, 68, 68, 0.3);
    }
    #clearAllBtn:active {
      transform: translateY(0);
    }
    #clearAllBtn:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
      box-shadow: none;
    }
    .warning {
      font-size: 12px;
      color: #991b1b;
      background-color: #fee2e2;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>One-Click Purge</h2>
      <p>Permanently delete all browser data and history.</p>
    </div>
    <div class="warning">
      <strong>Warning:</strong> This will log you out of all websites and clear your entire history.
    </div>
    <button id="clearAllBtn">Clear Everything Now</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
